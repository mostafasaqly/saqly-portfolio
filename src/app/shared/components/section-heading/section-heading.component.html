<div class="section-heading" [class.section-heading--center]="align() === 'center'">
  <span class="section-heading__eyebrow">{{ eyebrow() | t }}</span>
  <h2 class="section-heading__title">{{ title() | t }}</h2>

  @if (description()) {
    <p class="section-heading__description">
      {{ description() | t }}
    </p>
  }
</div>
