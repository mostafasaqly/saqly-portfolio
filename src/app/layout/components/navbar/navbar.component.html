<header class="navbar" [attr.dir]="currentDir()">
  <div class="container navbar__inner">
    <a class="navbar__brand" href="#home" (click)="closeMenu()">
      <span class="navbar__logo">MS</span>
      <span class="navbar__name">Mostafa Saqly</span>
    </a>

    <button
      class="navbar__menu-toggle"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen()"
      aria-label="Toggle navigation"
      aria-controls="mobile-navigation"
    >
      ☰
    </button>

    <nav class="navbar__nav navbar__nav--desktop" aria-label="Primary navigation">
      <!-- Main Sections dropdown -->
      <div class="navbar__dropdown" (mouseleave)="closeDropdown()">
        <button
          class="navbar__link navbar__dropdown-trigger"
          type="button"
          (mouseenter)="isDropdownOpen.set(true)"
          (click)="toggleDropdown()"
          [class.navbar__link--active]="navLinks().some(l => isActive(l.id))"
        >
          {{ 'nav.main' | t }}
          <span class="navbar__dropdown-arrow" [class.navbar__dropdown-arrow--open]="isDropdownOpen()">▾</span>
        </button>

        <div class="navbar__dropdown-menu" [class.navbar__dropdown-menu--open]="isDropdownOpen()">
          @for (link of navLinks(); track link.href) {
            <a
              class="navbar__dropdown-item"
              [class.navbar__dropdown-item--active]="isActive(link.id)"
              [href]="link.href"
              (click)="closeDropdown()"
            >
              {{ link.label | t }}
            </a>
          }
        </div>
      </div>

      <a class="navbar__link navbar__link--courses" [routerLink]="coursesLink.href">
        {{ coursesLink.label | t }}
      </a>
    </nav>

    <div class="navbar__actions navbar__actions--desktop">
      <button class="navbar__action" type="button" (click)="toggleLanguage()">
        {{ currentLanguage() === 'en' ? 'AR' : 'EN' }}
      </button>

      <button class="navbar__action" type="button" (click)="toggleTheme()">
        {{ isDark() ? ('theme.light' | t) : ('theme.dark' | t) }}
      </button>
    </div>
  </div>

  <div
    id="mobile-navigation"
    class="navbar__mobile-panel"
    [class.navbar__mobile-panel--open]="isMenuOpen()"
  >
    <div class="container navbar__mobile-content">
      <nav class="navbar__mobile-nav" aria-label="Mobile navigation">
        <!-- Main Sections collapsible group -->
        <div class="navbar__mobile-group">
          <button
            class="navbar__mobile-link navbar__mobile-group-trigger"
            type="button"
            (click)="toggleDropdown()"
            [class.navbar__mobile-link--active]="navLinks().some(l => isActive(l.id))"
          >
            {{ 'nav.main' | t }}
            <span class="navbar__dropdown-arrow" [class.navbar__dropdown-arrow--open]="isDropdownOpen()">▾</span>
          </button>

          <div class="navbar__mobile-group-items" [class.navbar__mobile-group-items--open]="isDropdownOpen()">
            <div class="navbar__mobile-group-inner">
              @for (link of navLinks(); track link.href) {
                <a
                  class="navbar__mobile-link navbar__mobile-link--sub"
                  [class.navbar__mobile-link--active]="isActive(link.id)"
                  [href]="link.href"
                  (click)="closeMenu(); closeDropdown()"
                >
                  {{ link.label | t }}
                </a>
              }
            </div>
          </div>
        </div>

        <a
          class="navbar__mobile-link navbar__mobile-link--courses"
          [routerLink]="coursesLink.href"
          (click)="closeMenu()"
        >
          {{ coursesLink.label | t }}
        </a>
      </nav>

      <div class="navbar__mobile-actions">
        <button class="navbar__action" type="button" (click)="toggleLanguage()">
          {{ currentLanguage() === 'en' ? 'AR' : 'EN' }}
        </button>

        <button class="navbar__action" type="button" (click)="toggleTheme()">
          {{ isDark() ? ('theme.light' | t) : ('theme.dark' | t) }}
        </button>
      </div>
    </div>
  </div>
</header>
